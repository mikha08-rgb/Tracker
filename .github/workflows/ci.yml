name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx tsc -b
      - run: npx oxlint
      - run: npx prettier --check .
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Three timezones (west, east, UTC+14) so any accidental UTC/local
        # mixing in date handling fails loudly.
        tz: [UTC, America/New_York, Pacific/Kiritimati]
    env:
      TZ: ${{ matrix.tz }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm test
